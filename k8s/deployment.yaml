apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ns-tetrisapp
  name: tetrisapp-deployment
  labels:
    app: tetrisapp
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tetrisapp
  template:
    metadata:
      labels:
        app: tetrisapp
        environment: production
    spec:
      containers:
        - name: tetrisapp-container
          image: mokadir/tetrisapp:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: APP_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10